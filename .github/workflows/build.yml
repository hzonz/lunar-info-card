name: Auto Build & Release Draft

on:
  push:
    branches: [main]
    paths:
      - 'package.json'
      - 'src/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 必须获取历史记录以比对标签

      - name: Check Version Change
        id: check_version
        shell: bash
        run: |
          # 1. 获取当前 package.json 版本
          NEW_VER=$(jq -r .version package.json)
          
          # 2. 获取 Git 最新标签版本 (若无标签则设为 v0.0.0)
          OLD_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          OLD_VER=${OLD_TAG#v} # 去掉前面的 'v'
          
          echo "Current version in package.json: $NEW_VER"
          echo "Latest Git tag: $OLD_VER"

          # 3. 版本比对逻辑
          if [ "$NEW_VER" != "$OLD_VER" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "version=$NEW_VER" >> $GITHUB_OUTPUT
            
            # 判断是否为预发布版本
            if [[ "$NEW_VER" =~ (alpha|beta|rc) ]]; then
              echo "prerelease=true" >> $GITHUB_OUTPUT
            else
              echo "prerelease=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "Version has not changed. Skipping build."
          fi

      # --- 只有版本变化后，才会执行下面的耗时操作 ---

      - name: Setup Node.js
        if: steps.check_version.outputs.changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'none'

      - name: Install dependencies
        if: steps.check_version.outputs.changed == 'true'
        run: npm ci

      - name: Build project
        if: steps.check_version.outputs.changed == 'true'
        run: npm run build

      - name: Prepare Release Asset
        if: steps.check_version.outputs.changed == 'true'
        id: asset
        run: |
          # 通用提取：从 package.json 获取 name 作为文件名
          RAW_NAME=$(jq -r .name package.json)
          FILE_NAME="${RAW_NAME}.js"
          
          # 路径兼容逻辑：优先找 dist/，找不到则找根目录
          if [ -f "dist/$FILE_NAME" ]; then
            cp "dist/$FILE_NAME" "./$FILE_NAME"
          elif [ -f "$FILE_NAME" ]; then
            echo "Asset already in root."
          else
            # 兜底：如果文件名不匹配，寻找 dist 下唯一的 js 文件
            GENERIC_JS=$(ls dist/*.js 2>/dev/null | head -n 1)
            if [ -n "$GENERIC_JS" ]; then
              cp "$GENERIC_JS" "./$FILE_NAME"
            else
              echo "Error: Build artifact not found!"
              exit 1
            fi
          fi
          echo "final_name=$FILE_NAME" >> $GITHUB_OUTPUT

      - name: Create GitHub Release Draft
        if: steps.check_version.outputs.changed == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.check_version.outputs.version }}
          name: v${{ steps.check_version.outputs.version }} - ${{ github.event.head_commit.message }}
          files: ${{ steps.asset.outputs.final_name }}
          draft: true
          prerelease: ${{ steps.check_version.outputs.prerelease == 'true' }}
          generate_release_notes: true
          target_commitish: ${{ github.sha }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
